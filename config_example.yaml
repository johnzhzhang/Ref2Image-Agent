# 通用图像生成流水线配置
# 用法: python3 generate_pipeline.py --config config_example.yaml

project: "john-poc-453315"
num_images: 3
output_dir: "./output"
output_prefix: "shuanglin"

# Pro Image 生成参数
generation_config:
  model: "gemini-3-pro-image"
  temperature: 0.6      # 降低=更稳定一致，升高=更有创意
  top_p: 0.75           # 降低=更可预测，升高=更多样
  aspect_ratio: "1:1"   # 支持: 1:1, 3:4, 4:3, 16:9, 9:16 等

