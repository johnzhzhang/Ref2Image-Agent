{
            "prompt": "=== TASK ===\nGenerate image\n\n=== GLOBAL STYLE ===\nStyle: Q版3D角色风格，角色比例夸张（大头小身），造型圆润可爱，表情生动夸张，场景元素丰富且布局紧凑，视角多为平视，线条细腻流畅，质感光滑细腻\nColor Palette: 高饱和明亮配色，色彩鲜艳活泼，主色调明快温暖\nLighting: 柔和均匀光照，高光柔和，阴影边缘圆润，整体氛围明亮清新\nRefs:\n[IMG_2] \n\n=== WORLD LORE ===\n3D 卡通3D 卡通3D 卡通\n\nRelationships: 小黄鸡最可爱\n\n=== SUBJECTS ===\nName: xiaohuan raccoon\nType: character\nDesc: 棕橙色身体，深棕色眼周斑纹，戴绿色小礼帽（星星装饰），穿绿色背带裤，黄色蝴蝶结领结，大条纹尾巴（棕色深浅交替环形条纹）。Q版大头小身。\nMetadata: Gender: unknown\nRefs:\n[IMG_1] \n\nName: laimen chick\nType: character\nDesc: 一只圆润的黄色小鸡，头顶有一个红色的鸡冠，橙色的喙和脚爪，身体呈圆形，有一对小小的黄色翅膀。小鸡有多种表情和姿态：有的是侧面视角，有的是正面视角，有的是背面视角；表情包括生气（眉头紧皱，嘴巴紧闭）、眨眼（一只眼睛眨成心形，嘴巴张开）、难过（眼睛含泪，双手放在脸颊旁）、开心（眼睛眯成一条缝，嘴巴大张）、惊讶（眼睛睁大，嘴巴张开）。整体风格为3D卡通，色彩鲜艳，造型可爱。\nMetadata: Height: 234cm, Gender: unknown, Age: 23\nRefs:\n[IMG_3] \n\nName: meme fox\nType: character\nMetadata: Gender: unknown\nRefs:\n[IMG_4] \n\nName: zimi owl\nType: character\nMetadata: Gender: unknown\nRefs:\n[IMG_5] [IMG_6] \n\nName: aido frog\nType: character\nMetadata: Gender: unknown\nRefs:\n[IMG_7] [IMG_8] \n\nName: lixiong bear\nType: character\nMetadata: Gender: unknown\nRefs:\n[IMG_9] [IMG_10] \n\n=== IMAGE MAP ===\n[IMG_1] (subject): xiaohuan raccoon\n[IMG_2] (style): style reference\n[IMG_3] (subject): laimen chick\n[IMG_4] (subject): meme fox\n[IMG_5] (subject): zimi owl\n[IMG_6] (subject): zimi owl\n[IMG_7] (subject): aido frog\n[IMG_8] (subject): aido frog\n[IMG_9] (subject): lixiong bear\n[IMG_10] (subject): lixiong bear\n\n=== INSTRUCTION ===\n- Use GLOBAL STYLE as overall visual direction\n- Use WORLD LORE for background logic and relationships\n- Only include SUBJECTS explicitly mentioned in USER INPUT (via @subjectName)\n- Maintain correct scale using world proportions reference\n- When USER INPUT refers to \"图X / 第X张图 / image X\", map to USER IMAGES\n=== USER INPUT ===\n3D卡通风格，水平视角，小动物们在山西双林寺里玩耍，有古建，古塔，古树@xiaohuan raccoon @laimen chick @meme fox @zimi owl @aido frog @lixiong bear\n",
